name: First Workflow
on:

  workflow_dispatch:
     inputs:
      days:
        description: "Days in the past to look back"
        required: false
        default: "7"
  push:
  pull_request:
    branches: ['**']     # any target branch
    paths: ['**']        # any files changed
    types: [opened, synchronize, reopened, ready_for_review]
   
 
 
  #MIN HOUR DAY MONTH WEEKDAY
  #12:00 IST → 06:30 UTC → cron: '30 6 * * *'
  # schedule:
  #   # Daily at 09:00 IST (UTC+5:30) -> 03:30 UTC
  #   - cron: '30 3 * * *'
permissions:
  contents: write

jobs:
  Prod-approver:
    name: Reviewer Approval
    runs-on: ubuntu-latest
    environment: Prod Approval
 
    steps:
      - uses: actions/checkout@v4
 
      - name: Request is sended
        run: |
          echo "Waiting for approver to approve this request"
  TimeZone-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: create folder
        run: |
          if [ -d "textfolder" ]; then
            echo "File and Folder Exist!"
          else
            mkdir -p textfolder
            echo "This file contains zone time, date and event"> textfolder/timestamp.txt
            echo "File and Folder Created Successfully!"
          fi

      - name: Write timestamp and event info
        run: |
          export TZ="Asia/Kolkata"
          NOW="$(date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "--------------------------------------------------------" >> textfolder/timestamp.txt
          echo "Event: ${{ github.event_name}}" >> textfolder/timestamp.txt
          echo "Repository: ${{ github.repository}}" >> textfolder/timestamp.txt
          echo "Branch: ${{ github.ref_name}}" >> textfolder/timestamp.txt
          echo "Changed file(s): ${CHANGED_FILES}" >> textfolder/timestamp.txt
          echo "Triggered at (IST): ${NOW}" >> textfolder/timestamp.txt
          echo "--------------------------------------------------------" >> textfolder/timestamp.txt

      - name: Commit changes
        run: |
          git config user.name "ani002agarwal"
          git config user.email "ankit.garg1.ext@bayer.com"
 
          git add textfolder/timestamp.txt
          git commit -m "Update timestamp from ${{github.event_name}}" || echo "No Commit"
          git push
          
  first-job:
   runs-on: ubuntu-latest
   steps:
     - name: print greeting
       run:  echo "Hello world!"
     - name: print by
       run: echo "Done by"
  Dev:
    runs-on: ubuntu-latest
    environment: Dev
    steps:
      - name: print Dev Environment Variable
        run: |
          echo "Dev Variable 1= ${{vars.variable1}}"
          echo "secret Variable= ${{secrets.passkey}}"
          
      - uses: actions/checkout@v4

  Test:
    runs-on: ubuntu-latest
    needs: [Dev]
    environment: Test
    steps:
      - name: print Test environment Variable
        run: |
          echo "Test Variable 1=${{vars.variable1}}"

  Prod:
   runs-on: ubuntu-latest
   needs: [Prod-approver,Test]
   environment: Prod
   steps:
     - name: print Prod Environment variable
       run: |
         echo "Prod Variable 1= ${{vars.variable1}}"
         echo "secret Variable= ${{secrets.privacy}}"

  count:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Count failed jobs in past N days
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DAYS: ${{ inputs.days || '7' }}
        run: |
          set -euo pipefail
          set -x
 
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi
 
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
 
          BASE="https://api.github.com"
          NOW_UTC_ISO="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          SINCE_UTC_ISO="$(date -u -d "${DAYS} days ago" +"%Y-%m-%dT%H:%M:%SZ")"
 
          failed_jobs=0
          total_jobs=0
          runs_checked=0
 
          per_page=100
          page=1
 
          auth_header="Authorization: Bearer ${GITHUB_TOKEN}"
          accept_header="Accept: application/vnd.github+json"
          api_ver_header="X-GitHub-Api-Version: 2022-11-28"
 
          # ISO 8601 (Zulu) strings compare lexicographically
          iso_ge() { [[ "$1" > "$2" || "$1" == "$2" ]]; }
 
          while true; do
            runs_url="${BASE}/repos/${OWNER}/${REPO}/actions/runs?status=completed&per_page=${per_page}&page=${page}"
            runs_json="$(curl -sS -H "$accept_header" -H "$auth_header" -H "$api_ver_header" "$runs_url")"
 
            # Optional: detect GitHub API error
            if [[ "$(echo "$runs_json" | jq -r '.message // empty')" == "Bad credentials" ]]; then
              echo "ERROR: Bad credentials. Check GITHUB_TOKEN permissions."
              exit 1
            fi
 
            runs_count="$(echo "$runs_json" | jq '.workflow_runs | length')"
            if [[ "$runs_count" -eq 0 ]]; then
              break
            fi
 
            newest_on_page="$(echo "$runs_json" | jq -r '.workflow_runs[0].created_at')"
 
            # Collect run_ids within the time window
            mapfile -t run_ids_in_window < <(
              echo "$runs_json" \
              | jq -r --arg since "$SINCE_UTC_ISO" --arg now "$NOW_UTC_ISO" '
                  .workflow_runs[]
                  | select(.created_at >= $since and .created_at <= $now)
                  | .id
                '
            )
 
            for run_id in "${run_ids_in_window[@]}"; do
              (( runs_checked += 1 ))
              job_page=1
              while true; do
                jobs_url="${BASE}/repos/${OWNER}/${REPO}/actions/runs/${run_id}/jobs?per_page=100&page=${job_page}"
                jobs_json="$(curl -sS -H "$accept_header" -H "$auth_header" -H "$api_ver_header" "$jobs_url")"
                jobs_len="$(echo "$jobs_json" | jq '.jobs | length')"
                if [[ "$jobs_len" -eq 0 ]]; then
                  break
                fi
 
                page_total="$(echo "$jobs_json" | jq '[.jobs[]] | length')"
                page_failed="$(echo "$jobs_json" | jq '[.jobs[] | select(.conclusion=="failure")] | length')"
 
                (( total_jobs += page_total ))
                (( failed_jobs += page_failed ))
 
                if [[ "$jobs_len" -lt 100 ]]; then
                  break
                fi
                (( job_page += 1 ))
                sleep 0.1
              done
            done
 
            # Early exit if the newest run on this page is already older than the since window
            if ! iso_ge "$newest_on_page" "$SINCE_UTC_ISO"; then
              break
            fi
 
            (( page += 1 ))
          done
 
          echo "Failed job count (last ${DAYS} days): ${failed_jobs}"
          echo "Total job count: ${total_jobs}"
          echo "Runs analyzed:    ${runs_checked}"
          echo "Window: ${SINCE_UTC_ISO} -> ${NOW_UTC_ISO}"
 
          {
            echo "## Failed Jobs - Past ${DAYS} Days"
            echo "- **Failed jobs**: ${failed_jobs}"
            echo "- **Total jobs**:  ${total_jobs}"
            echo "- **Runs analyzed**: ${runs_checked}"
            echo "- **Window**: ${SINCE_UTC_ISO} → ${NOW_UTC_ISO}"
          } >> "$GITHUB_STEP_SUMMARY"
      

      
     
      
     
   
  
